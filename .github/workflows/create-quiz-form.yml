name: Create Quiz Google Form

on:
  repository_dispatch:
    types: [create-quiz-form]

# Minimum permissions for the workflow's GITHUB_TOKEN.
# Solo lectura del repo. No necesitamos write porque no pusheamos nada.
permissions:
  contents: read

# Evita que dos dispatches simultaneos pisen el mismo Apps Script.
# request_id viene del payload de Verdi y es unico por quiz.
concurrency:
  group: quiz-form-${{ github.event.client_payload.request_id || github.run_id }}
  cancel-in-progress: false

jobs:
  create-form:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp (pinned version)
        run: npm install -g @google/clasp@2.4.2

      - name: Restore clasp credentials from secrets
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
          CLASP_JSON: ${{ secrets.CLASP_JSON }}
        run: |
          # Escribimos los archivos via node para evitar shell-quoting bugs
          # cuando el secret contiene comillas/escapes (clave para JSON con tokens).
          node -e "require('fs').writeFileSync(require('os').homedir() + '/.clasprc.json', process.env.CLASPRC_JSON)"
          node -e "require('fs').writeFileSync('.clasp.json', process.env.CLASP_JSON)"
          # clasp v2 exige que exista appsscript.json local aunque la ejecucion
          # corre 100% remoto en los servers de Google. Stub minimo valido.
          echo '{"timeZone":"America/Santiago","runtimeVersion":"V8","exceptionLogging":"STACKDRIVER"}' > appsscript.json

      - name: Diagnostic — verify credentials structure (no values exposed)
        run: |
          echo "=== File existence and size ==="
          if [ -f "$HOME/.clasprc.json" ]; then
            echo "~/.clasprc.json exists: yes"
            echo "size: $(stat -c %s "$HOME/.clasprc.json") bytes"
          else
            echo "~/.clasprc.json: MISSING"
          fi
          if [ -f ".clasp.json" ]; then
            echo ".clasp.json exists: yes"
            echo "size: $(stat -c %s .clasp.json) bytes"
          else
            echo ".clasp.json: MISSING"
          fi
          if [ -f "appsscript.json" ]; then
            echo "appsscript.json exists: yes"
          else
            echo "appsscript.json: MISSING"
          fi
          echo ""
          echo "=== ~/.clasprc.json structure ==="
          node -e "
            const fs = require('fs');
            const path = require('os').homedir() + '/.clasprc.json';
            try {
              const obj = JSON.parse(fs.readFileSync(path, 'utf8'));
              console.log('parse: OK');
              console.log('top-level keys:', JSON.stringify(Object.keys(obj)));
              if (obj.token) {
                console.log('token keys:', JSON.stringify(Object.keys(obj.token)));
                console.log('has access_token:', !!obj.token.access_token);
                console.log('has refresh_token:', !!obj.token.refresh_token);
              }
              if (obj.oauth2ClientSettings) {
                console.log('oauth2ClientSettings keys:', JSON.stringify(Object.keys(obj.oauth2ClientSettings)));
              }
              console.log('isLocalCreds:', obj.isLocalCreds);
            } catch (e) {
              console.log('parse: FAIL', e.message);
              const content = fs.readFileSync(path, 'utf8');
              console.log('file first 30 chars:', JSON.stringify(content.substring(0, 30)));
            }
          "
          echo ""
          echo "=== clasp version on runner ==="
          clasp --version

      - name: Execute Apps Script createQuizFormFromJson
        env:
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          # clasp run --params espera un JSON-array de argumentos.
          # Envolvemos el client_payload en un array de un elemento.
          PARAMS=$(node -e "console.log(JSON.stringify([process.env.CLIENT_PAYLOAD]))")
          clasp run createQuizFormFromJson --params "$PARAMS"

      - name: Cleanup credentials from runner
        if: always()
        run: |
          # Defensive cleanup — el runner es ephemeral pero por las dudas
          # removemos los archivos antes de que termine el job.
          rm -f "$HOME/.clasprc.json" .clasp.json appsscript.json
